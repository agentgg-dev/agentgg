name: Release

# Tag-triggered publish to npm. Bump version in packages/cli/package.json
# and the root package.json, commit, then push a matching `v<version>` tag:
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Authentication uses npm trusted publishing (OIDC). No NPM_TOKEN secret
# is required — npm 11.5.1+ exchanges the GitHub Actions OIDC token
# (id-token: write) for a short-lived publish credential, and the same
# token signs the SLSA provenance attestation.
#
# Setup (one-time, already done):
#   1. npmjs.com → package `agentgg` → Settings → Publishing access →
#      add a Trusted Publisher with:
#        Publisher: GitHub Actions
#        Organization: agentgg-dev
#        Repository:   agentgg
#        Workflow:     .github/workflows/release.yml
#        Environment:  (leave blank)
#   2. Remove the legacy NPM_TOKEN secret from the repo (no longer used).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to sign the npm provenance attestation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Node 22 ships with npm 10.x; trusted publishing (OIDC) needs >=11.5.1.
      - name: Upgrade npm to a version that supports trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Gate the publish on the same checks ci.yml runs against main. The
      # release event doesn't piggy-back on the main-push CI run, so we
      # re-run them here on the exact commit being tagged. Single platform
      # (ubuntu) is enough because ci.yml already validated the matrix
      # (ubuntu/macos/windows) on the push to main.
      - name: Lint
        run: pnpm lint

      # Build before test: vitest imports @agentgg/core via the package's
      # "main": "./dist/index.js" entry, so the core's dist must exist
      # before any test that touches the CLI source. Mirrors ci.yml.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Build with bundled viewer
        run: pnpm --filter agentgg build:bundle

      # pnpm publish does not yet support npm trusted publishers / OIDC
      # (pnpm/pnpm#9812). Use `npm publish` directly: with no token
      # configured and `id-token: write` granted above, npm 11.5.1+
      # automatically does an OIDC token exchange against the trusted
      # publisher registered on npmjs.com, and --provenance produces a
      # verifiable SLSA attestation linking the tarball to this run.
      - name: Publish to npm via trusted publisher (OIDC) with provenance
        working-directory: packages/cli
        run: npm publish --provenance --access public
